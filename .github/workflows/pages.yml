name: Déploiement GitHub Pages

# Publie le dossier web/ comme site statique. La config Supabase est versionnée
# dans web/config.js (clé anon publique, lecture seule via RLS) → aucun secret,
# site portable. Le build se contente d'uploader web/ tel quel.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
